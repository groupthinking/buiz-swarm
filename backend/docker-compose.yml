# BuizSwarm Local Development Docker Compose

services:
  # FastAPI Application
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    ports:
      - "${BUIZSWARM_API_PORT:-8010}:8000"
    environment:
      - DEBUG=true
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/buizswarm
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=dev-secret-key-change-in-production
      - LOG_LEVEL=DEBUG
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_BEARER_TOKEN_BEDROCK=${AWS_BEARER_TOKEN_BEDROCK:-}
      - BEDROCK_MODEL_ID=${BEDROCK_MODEL_ID:-us.anthropic.claude-sonnet-4-6}
      - AWS_EC2_METADATA_DISABLED=true
      - PLATFORM_ROOT_DOMAIN=${PLATFORM_ROOT_DOMAIN:-agentbroker.app}
      - PLATFORM_APP_DOMAIN=${PLATFORM_APP_DOMAIN:-app.agentbroker.app}
      - PLATFORM_MARKETING_DOMAIN=${PLATFORM_MARKETING_DOMAIN:-agentbroker.app}
      - PLATFORM_DEFAULT_TEMPLATE=${PLATFORM_DEFAULT_TEMPLATE:-vercel-platforms-starter-kit}
      - PLATFORM_DEFAULT_DEPLOYMENT_TARGET=${PLATFORM_DEFAULT_DEPLOYMENT_TARGET:-vercel}
      - PLATFORM_DEFAULT_TENANCY=${PLATFORM_DEFAULT_TENANCY:-multi-tenant}
      - PLATFORM_DEFAULT_ADMIN_SURFACE=${PLATFORM_DEFAULT_ADMIN_SURFACE:-shared-dashboard}
      - PLATFORM_ROOT_DOMAIN=${PLATFORM_ROOT_DOMAIN:-agentbroker.app}
      - PLATFORM_APP_DOMAIN=${PLATFORM_APP_DOMAIN:-app.agentbroker.app}
      - PLATFORM_MARKETING_DOMAIN=${PLATFORM_MARKETING_DOMAIN:-agentbroker.app}
      - PLATFORM_DEFAULT_TEMPLATE=${PLATFORM_DEFAULT_TEMPLATE:-vercel-platforms-starter-kit}
      - PLATFORM_DEFAULT_DEPLOYMENT_TARGET=${PLATFORM_DEFAULT_DEPLOYMENT_TARGET:-vercel}
      - PLATFORM_DEFAULT_TENANCY=${PLATFORM_DEFAULT_TENANCY:-multi-tenant}
      - PLATFORM_DEFAULT_ADMIN_SURFACE=${PLATFORM_DEFAULT_ADMIN_SURFACE:-shared-dashboard}
    volumes:
      - ./app:/app/app
    depends_on:
      - db
      - redis
    networks:
      - buizswarm-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=buizswarm
    ports:
      - "${BUIZSWARM_DB_PORT:-5439}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - buizswarm-network

  # Redis Cache and Message Queue
  redis:
    image: redis:7-alpine
    ports:
      - "${BUIZSWARM_REDIS_PORT:-6389}:6379"
    volumes:
      - redis_data:/data
    networks:
      - buizswarm-network

  # Celery Worker (for background tasks)
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    environment:
      - DEBUG=true
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/buizswarm
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=dev-secret-key-change-in-production
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_BEARER_TOKEN_BEDROCK=${AWS_BEARER_TOKEN_BEDROCK:-}
      - BEDROCK_MODEL_ID=${BEDROCK_MODEL_ID:-us.anthropic.claude-sonnet-4-6}
      - AWS_EC2_METADATA_DISABLED=true
    volumes:
      - ./app:/app/app
    depends_on:
      - db
      - redis
    networks:
      - buizswarm-network
    command: celery -A app.tasks worker --loglevel=info

  # Flower - Celery Monitoring (optional)
  flower:
    image: mher/flower:2.0
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - FLOWER_PORT=5555
    ports:
      - "${BUIZSWARM_FLOWER_PORT:-5565}:5555"
    depends_on:
      - redis
    networks:
      - buizswarm-network

volumes:
  postgres_data:
  redis_data:

networks:
  buizswarm-network:
    driver: bridge
